        <script>

var isLightMode = true; 

function toggleLightMode() {
    var link = document.querySelector('link[href="mainstyles.css"]');
    if (isLightMode) {
        link.href = 'styles2.css';
        isLightMode = false;

    } else {
        toggleDarkMode();
    }
}
function toggleDarkMode() {
    var link = document.querySelector('link[href="mainstyles2.css"]');
    if (!isLightMode) {
        link.href = 'styles.css';
        isLightMode = true;

    } else {
        toggleLightMode();
    }
}
